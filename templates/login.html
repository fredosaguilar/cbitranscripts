<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/base.css">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="login-container surface">
        <div class="login-badge">Admin Portal</div>
        <h2>Welcome back</h2>
        <p class="login-subtitle">Sign in to manage tokens and transcripts.</p>
        <form action="/admin/login" method="post">
            <label for="username">Username</label>
            <input type="text" name="username" id="username" placeholder="Enter username" required>
            
            <label for="password">Password</label>
            <input type="password" name="password" id="password" placeholder="Enter password" required>
            
            <button type="submit">Login</button>
        </form>
        {% if error %}
        <p class="error">{{ error }}</p>
        {% endif %}
    </div>
</body>
</html>
